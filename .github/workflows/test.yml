name: Test & Coverage

on:
  push:
    branches: [ develop, main ]
  pull_request:
    branches: [ develop, main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run tests with coverage
        run: ./gradlew clean test

      - name: Check if coverage reports exist
        id: check_coverage
        run: |
          if find . -name "jacocoTestReport.xml" -path "*/jacoco/test/*" -type f | grep -q .; then
            echo "has_coverage=true" >> $GITHUB_OUTPUT
            echo "✅ Coverage reports found"
          else
            echo "has_coverage=false" >> $GITHUB_OUTPUT
            echo "⚠️ No coverage reports found (no tests executed)"
          fi

      - name: Upload coverage reports to Codecov
        if: steps.check_coverage.outputs.has_coverage == 'true'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: >-
            nextup-core/build/reports/jacoco/test/jacocoTestReport.xml,
            nextup-api/build/reports/jacoco/test/jacocoTestReport.xml,
            nextup-infrastructure/build/reports/jacoco/test/jacocoTestReport.xml,
            nextup-common/build/reports/jacoco/test/jacocoTestReport.xml
          flags: unittests
          name: codecov-nextup
          fail_ci_if_error: true
          verbose: true
          # Codecov가 codecov.yml 기준(80%)을 자동으로 체크

      - name: No tests warning
        if: steps.check_coverage.outputs.has_coverage == 'false'
        run: |
          echo "::warning::No test files found. Skipping coverage upload."
          echo "💡 Add tests to enable coverage tracking (target: 80%)"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            **/build/reports/tests/
            **/build/test-results/

      - name: Upload coverage HTML reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            **/build/reports/jacoco/

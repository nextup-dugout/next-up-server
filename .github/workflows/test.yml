name: Test & Coverage

on:
  push:
    branches: [ develop, main ]
  pull_request:
    branches: [ develop, main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run tests with coverage
        run: ./gradlew test jacocoTestReport

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: |
            ./nextup-core/build/reports/jacoco/test/jacocoTestReport.xml
            ./nextup-api/build/reports/jacoco/test/jacocoTestReport.xml
            ./nextup-infrastructure/build/reports/jacoco/test/jacocoTestReport.xml
            ./nextup-common/build/reports/jacoco/test/jacocoTestReport.xml
          flags: unittests
          name: codecov-nextup
          fail_ci_if_error: true
          # Codecov가 codecov.yml 기준(80%)을 자동으로 체크

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            **/build/reports/tests/
            **/build/test-results/

      - name: Upload coverage HTML reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            **/build/reports/jacoco/
